<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0F1A"/>
      <stop offset="100%" stop-color="#06070D"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="50%" stop-color="#5B8DEF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Shield outline -->
  <path d="M16 4 L26 9 L26 17 C26 22.5 21.5 27 16 28 C10.5 27 6 22.5 6 17 L6 9 Z" 
        fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.9"/>
  <!-- Radar sweep -->
  <circle cx="16" cy="15" r="6" fill="none" stroke="#00E5A0" stroke-width="0.8" opacity="0.4"/>
  <circle cx="16" cy="15" r="3" fill="none" stroke="#00E5A0" stroke-width="0.8" opacity="0.6"/>
  <!-- Radar center dot -->
  <circle cx="16" cy="15" r="1.5" fill="#00E5A0"/>
  <!-- Scan line -->
  <line x1="16" y1="15" x2="22" y2="11" stroke="#00E5A0" stroke-width="1" opacity="0.8"/>
  <!-- Signal dots -->
  <circle cx="19" cy="12" r="1" fill="#5B8DEF" opacity="0.8"/>
  <circle cx="13" cy="18" r="0.8" fill="#A855F7" opacity="0.6"/>
</svg>
